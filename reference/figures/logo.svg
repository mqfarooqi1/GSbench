<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 173.2 200" width="173.2" height="200" role="img" aria-label="GSbench">
  <defs>
    <style>
      .hexfill { fill: #ffffff; }
      .hexborder { fill: none; stroke: #2e7d32; stroke-width: 6; }
      .strand { fill: none; stroke: #2e7d32; stroke-width: 4.5; stroke-linecap: round; stroke-linejoin: round; }
      .rung { stroke: #f9a825; stroke-width: 2.6; stroke-linecap: round; }
      .title { fill: #2e7d32; font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; font-weight: 700; }
    </style>
  </defs>

  <!-- hexagon -->
  <polygon class="hexfill" points="86.6,4 168.2,52 168.2,148 86.6,196 5,148 5,52"/>
  <polygon class="hexborder" points="86.6,4 168.2,52 168.2,148 86.6,196 5,148 5,52"/>

  <!-- DNA double helix (two strands, ~two turns) -->
  <g>
    <!-- rungs (base pairs) -->
    <line class="rung" x1="110.4" y1="53"  x2="62.8"  y2="53"/>
    <line class="rung" x1="101.3" y1="61"  x2="71.9"  y2="61"/>
    <line class="rung" x1="71.9"  y1="69"  x2="101.3" y2="69"/>
    <line class="rung" x1="62.8"  y1="77"  x2="110.4" y2="77"/>
    <line class="rung" x1="110.4" y1="93"  x2="62.8"  y2="93"/>
    <line class="rung" x1="101.3" y1="101" x2="71.9"  y2="101"/>
    <line class="rung" x1="71.9"  y1="109" x2="101.3" y2="109"/>
    <line class="rung" x1="62.8"  y1="117" x2="110.4" y2="117"/>

    <polyline class="strand" points="86.6,45 110.4,53 101.3,61 71.9,69 62.8,77 86.6,85 110.4,93 101.3,101 71.9,109 62.8,117 86.6,125"/>
    <polyline class="strand" points="86.6,45 62.8,53 71.9,61 101.3,69 110.4,77 86.6,85 62.8,93 71.9,101 101.3,109 110.4,117 86.6,125"/>
  </g>

  <!-- title -->
  <text class="title" x="86.6" y="160" font-size="26" text-anchor="middle">GS<tspan fill="#f9a825">bench</tspan></text>
</svg>
